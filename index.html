<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
  <main class="container">
    <header>
      <span id="dot" class="dot grey"></span>
      <h1>Screenpipe Keeper</h1>
      <span id="status-label">…</span>
    </header>

    <section id="setup" class="hidden">
      <p class="warn">Not set up yet. This pins a stable copy of screenpipe and installs a
      LaunchAgent so it always runs. macOS may ask you to re-grant
      <b>Screen Recording</b> permission for the new binary.</p>
      <button id="btn-setup">Set up &amp; start</button>
    </section>

    <section id="controls" class="hidden">
      <div class="row">
        <button id="btn-start">Start</button>
        <button id="btn-stop">Stop</button>
        <button id="btn-restart">Restart</button>
      </div>
      <div class="row">
        <button id="btn-data">Data folder</button>
        <button id="btn-logs">Logs</button>
        <button id="btn-update">Update screenpipe</button>
      </div>
    </section>

    <section id="perms" class="hidden">
      <p class="warn" id="perms-msg"></p>
      <div class="row" id="perms-buttons"></div>
      <div class="row"><button id="btn-recheck">Re-check</button></div>
    </section>

    <section id="metrics">
      <dl>
        <dt>Version</dt><dd id="m-version">—</dd>
        <dt>Uptime</dt><dd id="m-uptime">—</dd>
        <dt>Capture FPS</dt><dd id="m-fps">—</dd>
        <dt>Audio</dt><dd id="m-audio">—</dd>
        <dt>Pending transcripts</dt><dd id="m-pending">—</dd>
        <dt>Monitors</dt><dd id="m-monitors">—</dd>
      </dl>
    </section>

    <details>
      <summary>Recent logs</summary>
      <pre id="logs-pre">—</pre>
    </details>

    <p id="toast" class="toast hidden"></p>
  </main>
  </body>
</html>
