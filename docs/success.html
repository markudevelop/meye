<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Welcome to Meye Pro</title>
<style>
  :root{
    --bg:#ffffff; --bg-elev:#fbfbfc; --text:#1b1b1f; --muted:#76767e;
    --border:#e7e7ec; --accent:#6d5efc; --accent-hover:#5a4af2; --green:#34c759;
  }
  @media (prefers-color-scheme: dark){
    :root{--bg:#1a1b1e;--bg-elev:#212227;--text:#ececee;--muted:#9a9aa3;
      --border:#2b2c31;--accent:#8f81ff;--accent-hover:#a397ff;}
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px;
    -webkit-font-smoothing:antialiased}
  .card{max-width:480px;text-align:center;background:var(--bg-elev);border:1px solid var(--border);
    border-radius:20px;padding:46px 36px;box-shadow:0 20px 60px rgba(20,20,40,.12)}
  .check{width:64px;height:64px;border-radius:50%;display:grid;place-items:center;margin:0 auto 22px;
    background:color-mix(in srgb,var(--green) 16%,transparent);color:var(--green);font-size:34px}
  h1{font-size:27px;letter-spacing:-.02em;margin-bottom:12px}
  p{color:var(--muted);font-size:16px;line-height:1.6;margin-bottom:10px}
  .key{margin:22px 0;padding:16px;border:1px dashed var(--border);border-radius:12px;
    font-family:ui-monospace,"SF Mono",Menlo,monospace;color:var(--text);font-size:14px}
  .btn{display:inline-block;margin-top:18px;font-weight:600;font-size:15px;padding:12px 24px;border-radius:11px;
    background:var(--accent);color:#fff;text-decoration:none;box-shadow:0 4px 14px rgba(109,94,252,.35)}
  .btn:hover{background:var(--accent-hover)}
  a.plain{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <div class="check">✓</div>
    <h1>You're now Meye Pro</h1>
    <p>Thank you for supporting Meye. Your subscription is active.</p>
    <div class="key">
      <!-- FUTURE: license key delivery slot.
           Today Stripe emails the receipt; in-app license enforcement is TODO. -->
      Your license key is on its way to your email.
    </div>
    <p>Open Meye and enter the key to unlock Pro features. Didn't get it? Check spam, or reply to your Stripe receipt.</p>
    <a class="btn" href="./index.html">Back to home</a>
  </div>
</body>
</html>
