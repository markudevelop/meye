name: release

# Build downloadable Meye apps and attach them to a GitHub Release.
# Trigger manually ("Run workflow" / `gh workflow run release.yml -f tag=v0.1.3`)
# or by pushing a version tag like v0.1.3.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.3)"
        required: true
        default: "v0.1.3"
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: "--target universal-apple-darwin --bundles app,dmg"
          - platform: windows-latest
            rust_targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install JS deps
        run: npm install

      - name: Build app + publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Meye ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: |
            Includes the LAN remote viewer (view another Meye machine + AI narration).

            **macOS** (universal `.dmg`/`.app`) is **unsigned** — on first launch, right-click the app → **Open**, or run `xattr -cr /Applications/Meye.app`.
            **Windows** is the `.exe` NSIS installer.
          prerelease: false
          args: ${{ matrix.args }}
